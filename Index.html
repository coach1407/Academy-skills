<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>أكاديمية سكيلز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--green:#00c853;--green-glow:#00ff6a33;--gold:#ffd600;--red:#ff1744;--bg:#050e08;--card:#0a1a0f;--card2:#0f2016;--border:#1a3a22;--text:#e8f5e9;--muted:#4a7a56;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Tajawal,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{text-align:center;padding:2rem 1rem 1rem;}
header h1{font-size:2rem;font-weight:900;color:var(--green);text-shadow:0 0 30px var(--green-glow);}
header p{color:var(--muted);font-size:0.9rem;margin-top:0.3rem;}
.week-bar{display:flex;justify-content:center;align-items:center;gap:1rem;padding:1rem;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sync-status{font-size:0.78rem;padding:0.3rem 0.8rem;border-radius:20px;font-weight:700;}
.sync-ok{background:#00c85322;color:var(--green);border:1px solid #00c85344;}
.sync-err{background:#ff174422;color:var(--red);border:1px solid #ff174433;}
.sync-loading{background:#ffd60022;color:var(--gold);border:1px solid #ffd60033;}
.tabs{display:flex;overflow-x:auto;border-bottom:2px solid var(--border);background:var(--card);padding:0 1rem;}
.tab{padding:0.75rem 1.25rem;font-family:Tajawal,sans-serif;font-size:0.85rem;font-weight:700;border:none;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.tab-content{display:none;padding:1rem;}
.tab-content.active{display:block;}
.add-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;}
.add-section h3{color:var(--green);font-size:0.95rem;margin-bottom:0.75rem;}
.form-row{display:flex;gap:0.5rem;flex-wrap:wrap;}
input,select{font-family:Tajawal,sans-serif;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:0.6rem 0.75rem;font-size:0.9rem;outline:none;}
input::placeholder{color:var(--muted);}
.name-input{flex:1;min-width:140px;}
select option{background:#0a1a0f;}
.btn{font-family:Tajawal,sans-serif;font-weight:700;padding:0.6rem 1.2rem;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}
.btn-green{background:var(--green);color:#000;}
.btn-gold{background:var(--gold);color:#000;}
.btn-sm{padding:0.35rem 0.8rem;font-size:0.8rem;border-radius:6px;}
.btn-red{background:#ff174422;color:var(--red);border:1px solid #ff174433;}
.btn-blue{background:#1565c022;color:#42a5f5;border:1px solid #1565c033;}
.rating-day-select{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.day-pill{padding:0.4rem 1rem;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-family:Tajawal,sans-serif;font-size:0.82rem;font-weight:600;transition:all 0.2s;}
.day-pill.active{background:var(--green);color:#000;border-color:var(--green);}
.players-grid{display:flex;flex-direction:column;gap:0.75rem;}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.player-header{display:flex;align-items:center;padding:0.75rem 1rem;gap:0.75rem;cursor:pointer;}
.player-pos{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;flex-shrink:0;}
.pos-gk{background:#ff6d0022;color:#ff6d00;border:1px solid #ff6d0033;}
.pos-def,.pos-rb,.pos-lb{background:#1565c022;color:#42a5f5;border:1px solid #1565c033;}
.pos-mid{background:#6a1b9a22;color:#ce93d8;border:1px solid #6a1b9a33;}
.pos-fwd{background:#b71c1c22;color:#ef5350;border:1px solid #b71c1c33;}
.pos-rw,.pos-lw{background:#e6510022;color:#ffcc80;border:1px solid #e6510033;}
.player-name{font-weight:800;font-size:0.95rem;flex:1;}
.player-total{font-size:1.3rem;font-weight:900;color:var(--green);}
.player-total.zero{color:var(--muted);}
.criteria-grid{display:none;padding:0 1rem 1rem;gap:0.5rem;flex-direction:column;}
.criteria-grid.open{display:flex;}
.criteria-row{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;}
.criteria-label{font-size:0.82rem;color:var(--muted);flex:1;}
.score-btns{display:flex;gap:3px;}
.score-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-weight:700;font-size:0.78rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:Tajawal,sans-serif;}
.score-btn.selected{background:var(--green);color:#000;border-color:var(--green);}
.bonus-section{border-top:1px solid var(--border);margin-top:0.5rem;padding-top:0.5rem;}
.bonus-label{font-size:0.78rem;color:var(--gold);margin-bottom:0.4rem;font-weight:700;}
.bonus-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.3rem;}
.bonus-name{font-size:0.8rem;color:var(--muted);}
.counter-btns{display:flex;align-items:center;gap:0.4rem;}
.counter-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:Tajawal,sans-serif;}
.counter-val{font-weight:800;font-size:0.9rem;min-width:20px;text-align:center;color:var(--gold);}
.board-section{margin-bottom:1.5rem;}
.board-title{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;font-size:0.85rem;font-weight:800;color:var(--muted);}
.board-row{display:flex;align-items:center;padding:0.65rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:0.4rem;gap:0.75rem;}
.board-row:first-child{border-color:#ffd60044;background:#ffd60008;}
.board-row:nth-child(2){border-color:#b0bec544;}
.board-row:nth-child(3){border-color:#ff6d0044;}
.rank{font-size:1rem;font-weight:900;min-width:28px;text-align:center;}
.rank-1{color:var(--gold);}.rank-2{color:#b0bec5;}.rank-3{color:#ff6d00;}
.board-name{flex:1;font-weight:700;font-size:0.9rem;}
.board-pts{font-weight:900;font-size:1rem;color:var(--green);}
.board-pts.top{color:var(--gold);}
.empty-msg{text-align:center;color:var(--muted);font-size:0.85rem;padding:2rem;}
.danger-zone{background:#1a0a0a;border:1px solid #3a1a1a;border-radius:12px;padding:1rem;margin-top:1rem;}
.danger-zone h3{color:var(--red);font-size:0.85rem;margin-bottom:0.5rem;}
.danger-zone p{color:var(--muted);font-size:0.78rem;margin-bottom:0.75rem;}
.chevron{transition:transform 0.2s;color:var(--muted);font-size:0.8rem;}
.chevron.open{transform:rotate(180deg);}
.week-nav{display:flex;align-items:center;gap:0.5rem;}
.week-nav button{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0.3rem 0.7rem;cursor:pointer;font-size:1rem;font-family:Tajawal,sans-serif;}
.save-row{display:flex;justify-content:center;padding:1rem;}
.modal-overlay{display:none;position:fixed;inset:0;background:#000a;z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:340px;width:90%;text-align:center;}
.modal h3{color:var(--green);margin-bottom:0.75rem;}
.modal p{color:var(--muted);font-size:0.85rem;margin-bottom:1rem;line-height:1.6;}
.modal-btns{display:flex;gap:0.5rem;justify-content:center;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-left:4px;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #0003;border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-left:4px;}
</style>
</head>
<body>
<header>
  <h1>⚽ أكاديمية سكيلز</h1>
  <p>نظام التقييم الأسبوعي <span class="live-dot"></span></p>
</header>
<div class="week-bar">
  <div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <strong id="weekLabel">—</strong>
    <button onclick="changeWeek(1)">›</button>
  </div>
  <span id="syncStatus" class="sync-status sync-loading">جاري التحميل... <span class="spinner"></span></span>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('daily',this)">📋 التقييم اليومي</button>
  <button class="tab" onclick="switchTab('leaderboard',this)">🏆 المتصدرون</button>
  <button class="tab" onclick="switchTab('players',this)">👥 اللاعبون</button>
</div>
<div class="tab-content active" id="tab-daily">
  <div class="rating-day-select" id="dayPills"></div>
  <div class="players-grid" id="playerCards"></div>
  <div class="save-row">
    <button class="btn btn-gold" onclick="saveToCloud()" id="saveDayBtn">☁️ حفظ على السحابة</button>
  </div>
</div>
<div class="tab-content" id="tab-leaderboard">
  <div id="leaderboardContent"></div>
</div>
<div class="tab-content" id="tab-players">
  <div class="add-section">
    <h3>➕ إضافة لاعب جديد</h3>
    <div class="form-row">
      <input class="name-input" id="newPlayerName" placeholder="اسم اللاعب"/>
      <select id="newPlayerPos">
        <option value="fwd">⚡ مهاجم</option>
        <option value="rw">↗️ جناح أيمن</option>
        <option value="lw">↖️ جناح أيسر</option>
        <option value="mid">🔄 وسط</option>
        <option value="rb">🛡️ مدافع أيمن</option>
        <option value="lb">🛡️ مدافع أيسر</option>
        <option value="def">🛡️ مدافع</option>
        <option value="gk">🧤 حارس</option>
      </select>
      <button class="btn btn-green" onclick="addPlayer()">إضافة</button>
    </div>
  </div>
  <div id="playersList"></div>
  <div class="danger-zone">
    <h3>⚠️ منطقة الخطر</h3>
    <p>إعادة ضبط تقييمات الأسبوع الحالي فقط</p>
    <button class="btn btn-red btn-sm" onclick="confirmReset()">🗑️ إعادة ضبط</button>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalMsg"></p>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getDatabase, ref, set, get } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';

const firebaseConfig = {
  databaseURL: 'https://academy-skills-default-rtdb.firebaseio.com'
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const DAYS=['السبت','الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];
const CRITERIA=[
  {id:'attendance',label:'✅ الحضور والالتزام',max:1},
  {id:'effort',label:'💪 الجهد والاجتهاد',max:2},
  {id:'instructions',label:'📢 تنفيذ تعليمات المدرب',max:2},
  {id:'skill',label:'⚽ المهارة التقنية',max:2},
  {id:'teamwork',label:'🤝 التعاون مع الزملاء',max:1},
  {id:'spirit',label:'🔥 الروح القتالية',max:1},
  {id:'improvement',label:'📈 التحسن عن السابق',max:1}
];
const BONUS={
  gk:[{id:'saves',label:'تصدٍّ ناجح',pts:1},{id:'clean',label:'صفرية كاملة',pts:2}],
  def:[{id:'tackle',label:'قطع ناجح',pts:1},{id:'block',label:'صد هجمة',pts:1}],
  rb:[{id:'tackle',label:'قطع ناجح',pts:1},{id:'block',label:'صد هجمة',pts:1}],
  lb:[{id:'tackle',label:'قطع ناجح',pts:1},{id:'block',label:'صد هجمة',pts:1}],
  mid:[{id:'assist',label:'تمريرة حاسمة',pts:1},{id:'recovery',label:'استرجاع الكرة',pts:1}],
  fwd:[{id:'goal',label:'هدف',pts:2},{id:'assist',label:'تمريرة للهدف',pts:1}],
  rw:[{id:'goal',label:'هدف',pts:2},{id:'assist',label:'تمريرة للهدف',pts:1}],
  lw:[{id:'goal',label:'هدف',pts:2},{id:'assist',label:'تمريرة للهدف',pts:1}]
};
const POS_LABEL={gk:'حارس',def:'مدافع',rb:'مدافع أيمن',lb:'مدافع أيسر',mid:'وسط',fwd:'مهاجم',rw:'جناح أيمن',lw:'جناح أيسر'};
const POS_EMOJI={gk:'🧤',def:'🛡️',rb:'🛡️',lb:'🛡️',mid:'🔄',fwd:'⚡',rw:'↗️',lw:'↖️'};

let weekOffset=0, state={players:[],weeks:{},currentDay:0}, openCard=null;

function getWeekKey(o=0){const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff+o*7);return d.toISOString().slice(0,10);}
function currentWeekKey(){return getWeekKey(weekOffset);}
function getWeekData(){const k=currentWeekKey();if(!state.weeks[k])state.weeks[k]={ratings:{}};return state.weeks[k];}
function getWeekRatings(){return getWeekData().ratings;}
function setSyncStatus(t,m){const el=document.getElementById('syncStatus');el.className='sync-status sync-'+t;el.innerHTML=m;}

async function loadFromCloud(){
  setSyncStatus('loading','جاري التحميل... <span class="spinner"></span>');
  try {
    const snapshot = await get(ref(db, 'academy'));
    if (snapshot.exists()) {
      const data = snapshot.val();
      if (data.players) state.players = data.players;
      if (data.weeks) state.weeks = data.weeks;
      setSyncStatus('ok','✅ متصل بالسحابة');
    } else {
      setSyncStatus('ok','✅ جاهز');
    }
  } catch(e) {
    setSyncStatus('err','⚠️ خطأ: '+e.message);
  }
  renderAll();
}

async function saveToCloud(){
  const btn = document.getElementById('saveDayBtn');
  btn.innerHTML = 'جاري الحفظ... <span class="spinner"></span>';
  btn.disabled = true;
  try {
    await set(ref(db, 'academy'), {players: state.players, weeks: state.weeks});
    setSyncStatus('ok','✅ تم الحفظ على السحابة');
    btn.innerHTML = '✅ تم الحفظ!';
    btn.style.background = 'var(--green)';
  } catch(e) {
    setSyncStatus('err','⚠️ فشل: '+e.message);
    btn.innerHTML = '⚠️ فشل';
  }
  btn.disabled = false;
  setTimeout(()=>{btn.innerHTML='☁️ حفظ على السحابة';btn.style.background='';},3000);
}

window.saveToCloud = saveToCloud;

function changeWeek(d){weekOffset+=d;openCard=null;renderAll();}
window.changeWeek = changeWeek;

function getWeekLabel(){const d=new Date(currentWeekKey()),e=new Date(d);e.setDate(d.getDate()+6);return d.toLocaleDateString('en-GB',{month:'short',day:'numeric'})+' — '+e.toLocaleDateString('en-GB',{month:'short',day:'numeric'});}

function switchTab(id,btn){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');btn.classList.add('active');if(id==='leaderboard')renderLeaderboard();if(id==='players')renderPlayersList();}
window.switchTab = switchTab;

function renderAll(){document.getElementById('weekLabel').textContent=getWeekLabel();renderDailyTab();}

function addPlayer(){const name=document.getElementById('newPlayerName').value.trim(),pos=document.getElementById('newPlayerPos').value;if(!name)return;state.players.push({id:Date.now().toString(),name,pos});document.getElementById('newPlayerName').value='';renderPlayersList();renderPlayerCards();}
window.addPlayer = addPlayer;

function removePlayer(id){showModal('تأكيد الحذف','هل تريد حذف هذا اللاعب؟',[{label:'حذف',cls:'btn-red',action:()=>{state.players=state.players.filter(p=>p.id!==id);Object.values(state.weeks).forEach(w=>{if(w.ratings)delete w.ratings[id];});renderPlayersList();renderPlayerCards();closeModal();}},{label:'إلغاء',cls:'btn-blue',action:closeModal}]);}
window.removePlayer = removePlayer;

function renderPlayersList(){const el=document.getElementById('playersList');if(!state.players.length){el.innerHTML='<p class="empty-msg">لا يوجد لاعبون بعد</p>';return;}el.innerHTML=state.players.map(p=>`<div class="board-row"><div class="player-pos pos-${p.pos}">${POS_EMOJI[p.pos]}</div><div class="board-name">${p.name}</div><span style="color:var(--muted);font-size:0.8rem">${POS_LABEL[p.pos]}</span><button class="btn btn-red btn-sm" onclick="removePlayer('${p.id}')">حذف</button></div>`).join('');}

function renderDailyTab(){document.getElementById('dayPills').innerHTML=DAYS.map((d,i)=>`<button class="day-pill ${i===state.currentDay?'active':''}" onclick="selectDay(${i})">${d}</button>`).join('');renderPlayerCards();}

function selectDay(i){state.currentDay=i;openCard=null;renderDailyTab();}
window.selectDay = selectDay;

function getScore(pid,day){const r=getWeekRatings()[pid]?.[day];if(!r)return 0;let t=Object.values(r.criteria||{}).reduce((a,b)=>a+b,0);const p=state.players.find(x=>x.id===pid);if(p)(BONUS[p.pos]||[]).forEach(b=>{t+=(r.bonus?.[b.id]||0)*b.pts;});return t;}
function getTotalScore(pid){return DAYS.reduce((s,_,i)=>s+getScore(pid,i),0);}

function renderPlayerCards(){
  const el=document.getElementById('playerCards');
  if(!state.players.length){el.innerHTML='<p class="empty-msg">أضف لاعبين من تبويب "اللاعبون" أولاً</p>';return;}
  const ratings=getWeekRatings();
  el.innerHTML=state.players.map(p=>{
    const ds=getScore(p.id,state.currentDay),r=ratings[p.id]?.[state.currentDay]||{criteria:{},bonus:{}},bonuses=BONUS[p.pos]||[],isOpen=openCard===p.id;
    const criteriaHTML=CRITERIA.map(c=>{const btns=Array.from({length:c.max+1},(_,v)=>`<button class="score-btn ${(r.criteria[c.id]||0)===v?'selected':''}" onclick="setScore('${p.id}','${c.id}',${v});event.stopPropagation()">${v}</button>`).join('');return`<div class="criteria-row"><div class="criteria-label">${c.label} (/${c.max})</div><div class="score-btns">${btns}</div></div>`;}).join('');
    const bonusHTML=bonuses.length?`<div class="bonus-section"><div class="bonus-label">⭐ نقاط إضافية — ${POS_LABEL[p.pos]}</div>${bonuses.map(b=>`<div class="bonus-row"><div class="bonus-name">${b.label} (+${b.pts})</div><div class="counter-btns"><button class="counter-btn" onclick="changeBonus('${p.id}','${b.id}',-1);event.stopPropagation()">−</button><div class="counter-val">${r.bonus?.[b.id]||0}</div><button class="counter-btn" onclick="changeBonus('${p.id}','${b.id}',1);event.stopPropagation()">+</button></div></div>`).join('')}</div>`:'';
    return`<div class="player-card" id="card-${p.id}"><div class="player-header" onclick="toggleCard('${p.id}')"><div class="player-pos pos-${p.pos}">${POS_EMOJI[p.pos]}</div><div class="player-name">${p.name}</div><div class="player-total ${ds===0?'zero':''}" id="score-${p.id}">${ds}</div><div class="chevron ${isOpen?'open':''}">▼</div></div><div class="criteria-grid ${isOpen?'open':''}">${criteriaHTML}${bonusHTML}</div></div>`;
  }).join('');
}

function toggleCard(id){openCard=openCard===id?null:id;renderPlayerCards();}
window.toggleCard = toggleCard;

function ensureRating(pid){const wr=getWeekRatings();if(!wr[pid])wr[pid]={};if(!wr[pid][state.currentDay])wr[pid][state.currentDay]={criteria:{},bonus:{}};}

function setScore(pid,cid,val){ensureRating(pid);getWeekRatings()[pid][state.currentDay].criteria[cid]=val;const s=getScore(pid,state.currentDay);const el=document.getElementById('score-'+pid);if(el){el.textContent=s;el.className='player-total'+(s===0?' zero':'');}document.querySelectorAll(`[onclick*="setScore('${pid}','${cid}'"]`).forEach(b=>{const v=parseInt(b.getAttribute('onclick').match(/,(\d+)\)/)[1]);b.className='score-btn'+(val===v?' selected':'');});}
window.setScore = setScore;

function changeBonus(pid,bid,delta){ensureRating(pid);const cur=getWeekRatings()[pid][state.currentDay].bonus[bid]||0;getWeekRatings()[pid][state.currentDay].bonus[bid]=Math.max(0,cur+delta);const prev=openCard;openCard=pid;renderPlayerCards();openCard=prev;}
window.changeBonus = changeBonus;

function renderLeaderboard(){
  const el=document.getElementById('leaderboardContent');
  if(!state.players.length){el.innerHTML='<p class="empty-msg">لا يوجد لاعبون بعد</p>';return;}
  const ws=state.players.map(p=>({...p,total:getTotalScore(p.id)})).sort((a,b)=>b.total-a.total);
  const overall=renderBoard('🏆 أفضل لاعب في الأسبوع',ws);
  const byPos=['gk','def','rb','lb','mid','fwd','rw','lw'].map(pos=>{const f=ws.filter(p=>p.pos===pos);return f.length?renderBoard(`${POS_EMOJI[pos]} أفضل ${POS_LABEL[pos]}`,f):'';}).join('');
  const dailyStars=DAYS.map((day,di)=>{const scored=ws.map(p=>({...p,score:getScore(p.id,di)})).sort((a,b)=>b.score-a.score);const top=scored[0];if(!top||top.score===0)return`<div class="board-row"><span style="color:var(--muted)">${day}: لا يوجد تقييم</span></div>`;return`<div class="board-row"><span style="color:var(--gold)">⭐</span><div class="board-name">${day}</div><div style="font-weight:700">${top.name}</div><div class="board-pts">${top.score}</div></div>`;}).join('');
  el.innerHTML=`${overall}${byPos}<div class="board-section"><div class="board-title">⭐ نجوم الأيام</div>${dailyStars}</div>`;
}

function renderBoard(title,players){if(!players.length)return'';const medals=['🥇','🥈','🥉'];const rows=players.slice(0,3).map((p,i)=>`<div class="board-row"><div class="rank ${['rank-1','rank-2','rank-3'][i]||'rank-n'}">${medals[i]||i+1}</div><div class="player-pos pos-${p.pos}">${POS_EMOJI[p.pos]}</div><div class="board-name">${p.name}</div><div class="board-pts ${i===0?'top':''}">${p.total} نقطة</div></div>`).join('');return`<div class="board-section"><div class="board-title">${title}</div>${rows}</div>`;}

function showModal(title,msg,btns){document.getElementById('modalTitle').textContent=title;document.getElementById('modalMsg').textContent=msg;document.getElementById('modalBtns').innerHTML=btns.map((b,i)=>`<button class="btn ${b.cls}" onclick="modalAction(${i})">${b.label}</button>`).join('');document.getElementById('modalOverlay').classList.add('open');window._modalActions=btns.map(b=>b.action);}
window.modalAction = (i) => window._modalActions[i]();
window.closeModal = () => document.getElementById('modalOverlay').classList.remove('open');

function confirmReset(){showModal('تأكيد','سيتم حذف تقييمات الأسبوع الحالي فقط',[{label:'إعادة ضبط',cls:'btn-red',action:()=>{delete state.weeks[currentWeekKey()];closeModal();renderAll();}},{label:'إلغاء',cls:'btn-blue',action:closeModal}]);}
window.confirmReset = confirmReset;

loadFromCloud();
</script>
